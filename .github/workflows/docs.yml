name: Build and Deploy Docs

on:
  push:
    branches:
      - main
  workflow_dispatch:

permissions:
  contents: write

jobs:
  build-deploy:
    runs-on: ubuntu-latest

    steps:
      - name: Check out repository
        uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.12"

      - name: Install system dependencies
        run: |
          sudo apt-get update
          sudo apt-get install -y \
            gfortran \
            xvfb \
            libgl1 \
            libgl1-mesa-dri \
            libglu1-mesa

      - name: Install uv
        run: python -m pip install uv

      - name: Install project and documentation dependencies
        run: uv pip install --system -e ".[docs]"

      - name: Build Linux CEA backend
        shell: bash
        run: |
          CEA_ASSET_DIR="$(
            python - <<'PY'
            import importlib.util
            from pathlib import Path

            spec = importlib.util.find_spec("CEA_Wrap")
            if spec is None or spec.origin is None:
                raise RuntimeError("CEA_Wrap installation could not be located.")

            print(Path(spec.origin).parent / "assets")
            PY
          )"

          CEA_BUILD_DIR="$RUNNER_TEMP/cea-wrap"
          mkdir -p "$CEA_BUILD_DIR"

          gfortran \
            -O2 \
            -std=legacy \
            -I "$CEA_ASSET_DIR" \
            -o "$CEA_BUILD_DIR/Dan_CEA2" \
            "$CEA_ASSET_DIR/dan_cea2.f"

          test -x "$CEA_BUILD_DIR/Dan_CEA2"

          {
            echo "CEA_USE_SITE_PACKAGES=true"
            echo "CEA_EXE_LOCATION=$CEA_BUILD_DIR/Dan_CEA2"
            echo "CEA_THERMO_LIB=$CEA_ASSET_DIR/thermo.lib"
            echo "CEA_TRANS_LIB=$CEA_ASSET_DIR/trans.lib"
          } >> "$GITHUB_ENV"

      - name: Build Sphinx HTML
        run: xvfb-run -a sphinx-build -b html docs docs/_build/html

      - name: Deploy to GitHub Pages
        uses: peaceiris/actions-gh-pages@v4
        with:
          github_token: ${{ secrets.GITHUB_TOKEN }}
          publish_dir: docs/_build/html
          publish_branch: gh-pages
